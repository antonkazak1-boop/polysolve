services:
  - type: web
    name: polysolve-backend
    runtime: node
    plan: starter
    # Default blueprint region is oregon; EU = frankfurt (cannot change after service is created)
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: FRONTEND_URL
        value: https://polysolve-frontend.onrender.com
      - key: BLOCKED_COUNTRIES
        value: AU,BE,BY,BI,CF,CD,CU,DE,ET,FR,GB,IR,IQ,IT,KP,LB,LY,MM,NI,NL,PL,RU,SG,SO,SS,SD,SY,TH,TW,UA,UM,US,VE,YE,ZW
      # Set these in Render dashboard before enabling live trading:
      # POLY_PRIVATE_KEY, POLY_FUNDER_ADDRESS, POLY_SIGNATURE_TYPE,
      # POLY_API_KEY, POLY_API_SECRET, POLY_API_PASSPHRASE
    disk:
      name: polysolve-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: polysolve-frontend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NODE_OPTIONS
        value: --max-old-space-size=4096
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://polysolve-backend.onrender.com
